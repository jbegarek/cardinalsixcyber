server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    gzip on;
    gzip_types text/html text/css application/javascript text/xml application/json image/svg+xml font/woff2;
    gzip_min_length 256;
    gzip_vary on;

    include /etc/nginx/security-headers.conf;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location = / {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "public, max-age=300, s-maxage=3600" always;
        try_files /index.html =404;
    }

    location = /index.html {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "public, max-age=300, s-maxage=3600" always;
        try_files /index.html =404;
    }

    location = /news.html {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "public, max-age=300, s-maxage=3600" always;
        try_files /news.html =404;
    }

    location = /privacy.html {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "public, max-age=86400" always;
        try_files /privacy.html =404;
    }

    location = /terms.html {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "public, max-age=86400" always;
        try_files /terms.html =404;
    }

    location /_astro/ {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location = /robots.txt {
        try_files /robots.txt =404;
    }

    location = /rss.xml {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "public, max-age=3600" always;
        add_header Content-Type "application/rss+xml; charset=utf-8" always;
        try_files /rss.xml =404;
    }

    location = /sitemap.xml {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "public, max-age=86400" always;
        try_files /sitemap.xml /sitemap-index.xml =404;
    }

    location ~ ^/sitemap.*\.xml$ {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri =404;
    }

    location /fonts/ {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location /brand/ {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        try_files $uri =404;
    }

    location /data/ {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Strip trailing slashes so /nist-800-171/ → /nist-800-171 → /nist-800-171.html
    rewrite ^(.+)/$ $1 permanent;

    # Catch-all: $uri/ removed to prevent 403 on directories that lack index.html.
    # All pages are flat .html files (Astro format:file). $uri.html handles /slug -> /slug.html.
    location / {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "public, max-age=300, s-maxage=3600" always;
        try_files $uri $uri.html =404;
    }
}
