<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardinal Six Cyber | Coming Soon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 2rem;
        }

        .logo {
            max-width: 320px;
            width: 100%;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #ccc;
            margin-bottom: 1rem;
        }

        .divider {
            width: 80px;
            height: 2px;
            background: #c0392b;
            margin: 1.5rem auto;
        }

        p {
            font-size: 1.1rem;
            color: #888;

            font-size: 0.9rem;
            color: #666;
        }

        .contact a {

            text-decoration: none;
        }

        .contact a:hover {
            text-decoration: underline;
        }

<body>
    <img src="brand/logo.png" alt="Cardinal Six Cyber" class="logo">
