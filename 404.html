<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Cardinal Six Cyber</title>
    <meta name="description" content="The page you're looking for doesn't exist. Return to Cardinal Six Cyber's homepage.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" sizes="32x32" href="brand/favicon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="brand/icon-180.png">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="stylesheet" href="fonts/fonts.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: var(--c6-gradient-hero);
            overflow: hidden;
        }

        .error-page::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 900px;
            height: 900px;
            background: radial-gradient(ellipse at center, rgba(192, 57, 43, 0.06) 0%, rgba(192, 57, 43, 0.02) 40%, transparent 70%);
            pointer-events: none;
        }

        .error-grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
        }

        .error-content {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 600px;
            padding: var(--space-8);
        }

        .error-logo {
            width: 120px;
            height: auto;
            margin: 0 auto var(--space-10);
            filter: drop-shadow(0 0 40px rgba(192, 57, 43, 0.2)) drop-shadow(0 0 80px rgba(192, 57, 43, 0.08));
        }

        .error-code {
            font-family: var(--font-display);
            font-size: clamp(5rem, 12vw, 9rem);
            font-weight: 700;
            letter-spacing: 0.08em;
            line-height: 1;
            color: var(--c6-text-primary);
            margin-bottom: var(--space-2);
            position: relative;
        }

        .error-code .accent {
            color: var(--c6-red-bright);
        }

        .error-code::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--c6-red), transparent);
            opacity: 0.3;
        }

        .error-label {
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--c6-red-text);
            margin-bottom: var(--space-8);
        }

        .error-message {
            font-family: var(--font-body);
            font-size: 1.05rem;
            color: var(--c6-text-body);
            line-height: 1.7;
            margin-bottom: var(--space-10);
            max-width: 440px;
            margin-left: auto;
            margin-right: auto;
        }

        .error-actions {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: var(--space-6);
            flex-wrap: wrap;
        }

        .error-meta {
            margin-top: var(--space-16);
            font-family: var(--font-mono);
            font-size: 0.72rem;
            color: var(--c6-text-dim);
            letter-spacing: 0.04em;
        }

        .error-meta span {
            color: var(--c6-red-text);
        }

        @media (max-width: 480px) {
            .error-actions {
                flex-direction: column;
                width: 100%;
            }

            .error-actions .btn-primary,
            .error-actions .btn-secondary {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <div class="scanlines" aria-hidden="true"></div>

    <main class="error-page">
        <div class="error-grid" aria-hidden="true"></div>
        <div class="error-content">
            <picture>
                <source srcset="brand/logo.webp" type="image/webp">
                <img src="brand/logo.png" alt="Cardinal Six Cyber" class="error-logo" width="640" height="640">
            </picture>
            <h1 class="error-code">4<span class="accent">0</span>4</h1>
            <p class="error-label">Sector Not Found</p>
            <div class="divider" style="margin-bottom: var(--space-8);"></div>
            <p class="error-message">
                The page you're looking for doesn't exist or has been moved. Regroup and return to base.
            </p>
            <div class="error-actions">
                <a href="/" class="btn-primary">Return to Base</a>
                <a href="news.html" class="btn-secondary">Cyber News</a>
            </div>
            <div class="error-meta">
                <span>&gt;</span> cardinal_six_cyber <span>//</span> status: area_clear
            </div>
        </div>
    </main>

</body>
</html>
